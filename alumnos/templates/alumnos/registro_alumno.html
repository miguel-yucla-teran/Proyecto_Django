<!-- DTL - Django Templates Language (Python minimizada) -->
{% extends 'index.html' %}

{% block titulo %} Registro de Alumno {% endblock %}

{% block contenido %}

        <h1>Registrar un Nuevo Alumno</h1>
        <form method = "POST">
            {% csrf_token %}

            <div>
                {{ form.as_p }}
            </div>
            <div>
                <button type = "submit">
                    Registrar Alumno
                </button>
            </div>
        </form>

{% endblock %}
